services:
  app:
    restart: always
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      s-network:
#database as Postgresql
  postgres:
    image: postgres:latest
    container_name: postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: students
    ports:
      - "5433:5432"
    networks:
      s-network:
    volumes:
      - postgres-data:/var/lib/postgresql/data#network setup
networks:
 s-network:
  driver: bridge

#setting external storage for database data persistence
volumes:
  postgres-data: